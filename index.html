<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dispack Pro</title>
<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}
.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}
input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}
button{
background:#22c55e;
color:white;
font-weight:bold;
}
h1{margin-top:0;}
</style>
</head>
<body>

<h1>Dispack Pro</h1>

<div class="card">
<h3>Produção do Dia</h3>
<input type="number" id="producao" placeholder="Digite a produção">
<button onclick="salvar()">Salvar</button>
</div>

<div class="card">
<h3>Resultado</h3>
<p id="resultado">Nenhum dado salvo</p>
</div>

<script>
function salvar(){
let valor=document.getElementById("producao").value;
localStorage.setItem("producao",valor);
document.getElementById("resultado").innerText="Produção registrada: "+valor;
}
window.onload=function(){
let salvo=localStorage.getItem("producao");
if(salvo){
document.getElementById("resultado").innerText="Produção registrada: "+salvo;
}
}
</script>

</body>
</html>
